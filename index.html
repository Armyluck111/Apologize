<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لولو حبيبتي ونور عيني🫂</title>

<style>
:root {
    --primary-color: #ff4d6d;
    --secondary-color: #fff0f3;
    --text-color: #590d22;
}

body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background-color: var(--secondary-color);
    margin: 0;
    overflow-x: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

.card {
    background: white;
    padding: 30px;
    border-radius: 25px;
    box-shadow: 0 15px 35px rgba(255, 77, 109, 0.2);
    max-width: 450px;
    width: 90%;
    text-align: center;
    border: 2px solid #ffb3c1;
    transition: all 0.5s ease;
}

#page1 { display: block; }
#page2 { display: none; transform: scale(0.8); opacity: 0; }

h1 { color: var(--primary-color); margin-bottom: 15px; font-size: 1.8rem; }
p { color: var(--text-color); font-size: 1.2rem; line-height: 1.6; }

.btn {
    background-color: var(--primary-color);
    color: white;
    padding: 15px 35px;
    border: none;
    border-radius: 50px;
    font-size: 1.2rem;
    cursor: pointer;
    margin-top: 20px;
    transition: 0.3s;
    box-shadow: 0 5px 15px rgba(255, 77, 109, 0.4);
}

.btn:hover { 
    transform: scale(1.05); 
    background-color: #ff758f; 
}

.hug-icon { font-size: 80px; margin: 20px 0; display: block; }

.heart {
    color: #ff4d6d;
    font-size: 40px;
    animation: beat 1s infinite;
}

@keyframes beat {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.2); }
}

/* ✅ الصور جنب بعض */
.images-container {
    display: flex;
    justify-content: center;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 20px;
}

.images-container img {
    width: 130px;
    border-radius: 15px;
    border: 3px solid #ff4d6d;
    transition: 0.3s;
}

.images-container img:hover {
    transform: scale(1.05);
}
</style>
</head>

<body>

<div id="page1" class="card">
    <div class="heart">❤️</div>
    <h1>لو سهل عليا نبعد مش هاحاول عشانك مليش غيرك🥺</h1>
<h2>بحبك♥</h2>

  
    <!-- ✅ بدل صورة واحدة بقى 3 صور -->
    <div class="images-container">
       <img src="https://i.ibb.co/2Y76fhKv/IMG-20251205-WA0102.jpg" alt="IMG-20251205-WA0102" border="0"class="main-img" >
        <img src="https://i.ibb.co/zVGFNrsN/Snapchat-1931769433.jpg" alt="Snapchat-1931769433" border="0" class="main-img">
        <img src="https://i.ibb.co/cKWFKQ8k/Snapchat-1371369196.jpg" alt="Snapchat-1371369196" border="0" class="main-img">
    </div>

    <p>عارف إن قلبي ميهونش عليه زعلك، والدنيا وحشة أوي وأنتي بعيدة عني.. ممكن تسامحيني؟</p>

    <button class="btn" onclick="showHugPage()">سامحتك خلاص 🌸</button>
</div>

<div id="page2" class="card">
    <span class="hug-icon">🤗❤️</span>
    <h1>تعالي في حضني بقى!</h1>
    <p>وحشتيني أوي.. ومينفعش نفضل زعلانين من بعض أكتر من كدة.</p>
    <div class="heart">💖✨</div>
    <p style="font-size: 0.9rem; color: #888; margin-top: 20px;">أوعدك مش هزعلك تاني</p>
    <button class="btn" onclick="location.reload()" style="background: #999; font-size: 0.9rem; padding: 10px 20px;">رجوع</button>
</div>

<script>
function showHugPage() {
    const p1 = document.getElementById('page1');
    const p2 = document.getElementById('page2');

    p1.style.opacity = '0';
    p1.style.transform = 'translateY(-20px)';
    
    setTimeout(() => {
        p1.style.display = 'none';
        p2.style.display = 'block';
        setTimeout(() => {
            p2.style.opacity = '1';
            p2.style.transform = 'scale(1)';
        }, 50);
    }, 500);
}
</script>

</body>
</html>
